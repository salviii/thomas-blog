    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 500;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent                 0%,
        rgba(180,180,175,0.04)     62%,
        rgba(100,100, 95,0.20)     84%,
        rgba( 20, 20, 18,0.50)    100%
      );
      mix-blend-mode: multiply;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    thead tr, tbody tr {
      opacity: 0;
      animation: fadeUp 0.15s ease forwards;
    }
    @media (prefers-reduced-motion: reduce) {
      thead tr, tbody tr { opacity: 1; animation: none; }
    }

    @keyframes noiseShift {
      0%   { transform: translate(0,    0);   }
      12%  { transform: translate(-5px, 3px); }
      25%  { transform: translate( 4px,-4px); }
      37%  { transform: translate(-3px, 5px); }
      50%  { transform: translate( 5px,-2px); }
      62%  { transform: translate(-4px,-4px); }
      75%  { transform: translate( 3px, 5px); }
      87%  { transform: translate(-5px,-1px); }
      100% { transform: translate( 2px, 3px); }
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 501;
      opacity: 0.25;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      animation: noiseShift 0.05s steps(1) infinite;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      background: #F8F5E9;
      padding: 14px 18px;
      border-right:  1px dotted rgba(30,30,30,0.22);
      border-bottom: 1px dotted rgba(30,30,30,0.22);
      vertical-align: middle;
      text-align: left;
    }

    th:last-child, td:last-child { border-right: none; }

    /* Blank edge spacer rows */
    tr.spacer td { height: 72px; border-bottom: 1px dotted rgba(30,30,30,0.22); }
    tfoot tr.spacer td { border-bottom: none; }

    /* Column widths */
    col.col-edge { width: 80px; }
    col.col-num  { width: 52px; }
    col.col-date { width: 110px; }
    col.col-title{ width: auto; }
    col.col-cat  { width: 90px; }

    /* Header row */
    thead th {
      padding: 22px 18px 18px;
      vertical-align: bottom;
    }

    .th-back a {
      font-family: var(--font-serif);
      font-size: 22px;
      color: var(--color-gray);
      text-decoration: none;
    }
    .th-back a:hover { color: var(--color-black); }

    .th-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .th-count {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-gray);
      text-align: right;
    }

    /* Article rows */
    tbody tr { cursor: pointer; }
    tbody tr:hover td { background: var(--color-yellow); }
    tbody tr:hover .td-date,
    tbody tr:hover .td-cat  { color: rgba(30,30,30,0.45); }
    tbody tr:last-child td  { border-bottom: none; }

    .td-num {
      font-family: var(--font-mono);
      font-size: 9px;

      text-align: right;
      padding-right: 14px;
    }

    .td-date {
      font-family: var(--font-mono);
      font-size: 9px;

    }
    .td-title a {

      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-gray);
      text-align: right;
    }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas English — Journalist</title>
  <meta name="description" content="Thomas English — Contributor at The Daily Caller. Portfolio of articles covering politics, investigations, world affairs, and culture.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/grid.css">
  <link rel="stylesheet" href="css/cells.css">
  <link rel="stylesheet" href="css/interactions.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- OG Tags -->
  <meta property="og:title" content="Thomas English — Journalist">
  <meta property="og:description" content="Contributor at The Daily Caller covering politics, investigations, and world affairs.">
  <meta property="og:type" content="website">

  <style>
    /* Critical inline: prevent FOUC */
    .catalog-grid { min-height: 100vh; }
  </style>
</head>
<body>
  <main class="catalog-grid" id="grid">
    <!-- Grid cells injected by JavaScript -->
    <!-- No-JS fallback: -->
    <noscript>
      <div class="cell cell--title" style="grid-column: span 2; opacity: 1;">
        <div class="cell-content">
          <h1 class="site-title">Thomas English</h1>
          <p class="site-subtitle">Journalist — The Daily Caller</p>
          <p style="font-family: var(--font-sans); font-size: 14px; margin-top: 12px; color: var(--color-gray);">
            This site requires JavaScript to display the article grid. Please enable JavaScript to view Thomas's portfolio.
          </p>
        </div>
      </div>
    </noscript>
  </main>

  <!-- Scripts -->
  <script src="js/grid-builder.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/drag-drop.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
